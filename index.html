<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD HAND - PRO UPGRADE</title>
    <style>
        /* TEMA DASAR HITAM */
        :root { --utama: #ff0000; --aksen: #8000ff; } /* Default Merah & Ungu */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* HEADER & AVATAR */
        .header-radar { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #222; }
        .avatar { width: 50px; height: 50px; background: var(--utama); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #000; box-shadow: 0 0 15px var(--utama); }

        /* FORM STYLING */
        .layar { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; }
        .box-input { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #111; border: 1px solid #333; border-bottom: 2px solid var(--utama); color: #fff; padding: 12px; outline: none; }
        button { background: var(--utama); color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* GRID VIDEO UPGRADE */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; width: 100%; }
        .video-card { background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .video-card:hover { transform: translateY(-5px); border-color: var(--utama); }
        .thumbnail-placeholder { width: 100%; height: 100px; background: var(--aksen); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .video-info { padding: 10px; font-size: 13px; }

        /* PANEL CUSTOM WARNA */
        .color-panel { padding: 20px; background: #0a0a0a; border: 1px solid #222; margin: 20px; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="layar-reg" class="layar">
        <h1 style="color: var(--utama); letter-spacing: 10px;">DEAD HAND</h1>
        <div class="box-input">
            <input type="text" id="reg-user" placeholder="Username">
            <input type="text" id="reg-asli" placeholder="Nama Asli">
            <input type="password" id="reg-pass" placeholder="Password (Wajib)">
            <input type="email" id="reg-email" placeholder="Email (Opsional)">
            <button onclick="prosesDaftar()">INISIALISASI & MASUK</button>
        </div>
    </div>

    <div id="layar-radar" class="hidden">
        <div class="header-radar">
            <div>
                <h2 id="judul-pilot" style="margin:0; font-size: 18px;">PILOT: -</h2>
                <small style="color: #555;">SISTEM RADAR AKTIF</small>
            </div>
            <div id="user-avatar" class="avatar">?</div>
        </div>

        <div class="color-panel">
            <label style="font-size: 12px; color: #888;">CUSTOM TEMA WARNA:</label>
            <input type="color" id="color-picker" onchange="gantiWarna(this.value)" value="#ff0000">
        </div>

        <div style="padding: 0 20px;">
            <button onclick="uploadBaru()" style="width: 100%; border-radius: 5px;">+ UPLOAD DATA VIDEO</button>
        </div>

        <div id="list-video" class="video-grid">
            </div>
    </div>

    <script>
        let dbUser = JSON.parse(localStorage.getItem('deadhand_pro_users')) || [];
        let dbVideo = JSON.parse(localStorage.getItem('deadhand_pro_vids')) || [];
        let userSekarang = null;

        // 1. AUTO-LOGIN SETELAH DAFTAR
        function prosesDaftar() {
            let u = document.getElementById('reg-user').value;
            let n = document.getElementById('reg-asli').value;
            let p = document.getElementById('reg-pass').value;
            let e = document.getElementById('reg-email').value;

            if(u && n && p) {
                let data = { username: u, nama: n, pass: p, email: e, warna: '#ff0000' };
                dbUser.push(data);
                localStorage.setItem('deadhand_pro_users', JSON.stringify(dbUser));
                
                // LANGSUNG MASUK (AUTO-LOGIN)
                masukSistem(data);
            } else { alert("Lengkapi data!"); }
        }

        function masukSistem(data) {
            userSekarang = data;
            document.getElementById('layar-reg').classList.add('hidden');
            document.getElementById('layar-radar').classList.remove('hidden');
            
            // SET NAMA & AVATAR (HURUF DEPAN)
            document.getElementById('judul-pilot').innerText = "PILOT: " + data.nama.toUpperCase();
            document.getElementById('user-avatar').innerText = data.nama.charAt(0).toUpperCase();
            
            muatVideo();
        }

        // 2. CUSTOM WARNA
        function gantiWarna(warna) {
            document.documentElement.style.setProperty('--utama', warna);
            document.getElementById('user-avatar').style.boxShadow = `0 0 15px ${warna}`;
        }

        // 3. UPLOAD & MEMORI VIDEO
        function uploadBaru() {
            let j = prompt("Judul Video:");
            let l = prompt("Link Video (URL):");
            if(j && l) {
                dbVideo.push({ pemilik: userSekarang.username, judul: j, link: l });
                localStorage.setItem('deadhand_pro_vids', JSON.stringify(dbVideo));
                muatVideo();
            }
        }

        function muatVideo() {
            let wadah = document.getElementById('list-video');
            wadah.innerHTML = "";
            let filtered = dbVideo.filter(v => v.pemilik === userSekarang.username);

            filtered.forEach(v => {
                wadah.innerHTML += `
                    <div class="video-card" onclick="window.open('${v.link}', '_blank')">
                        <div class="thumbnail-placeholder">${v.judul.charAt(0).toUpperCase()}</div>
                        <div class="video-info">
                            <b>${v.judul}</b><br>
                            <small style="color:var(--utama)">KLIK UNTUK NONTON</small>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
