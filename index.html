<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google x DEAD HAND - OS</title>
    <style>
        /* GOOGLE MATERIAL DESIGN THEME (Clean Dark Mode) */
        :root { 
            --bg: #202124; --surface: #303134; --primary: #8ab4f8; 
            --text: #e8eaed; --text-sec: #9aa0a6; --danger: #ea4335;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Google Sans', Roboto, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* 1. GOOGLE TOP NAV BAR */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 24px; background: var(--surface); border-bottom: 1px solid #3c4043;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { font-size: 22px; font-weight: 500; letter-spacing: 1px; color: var(--text); display: flex; align-items: center; gap: 10px;}
        
        /* MESIN PENCARI PINTAR (SMART SEARCH) */
        .search-box {
            flex-grow: 1; max-width: 600px; margin: 0 20px;
            position: relative;
        }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 24px;
            border: 1px solid #5f6368; background: var(--bg); color: var(--text);
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); background: #303134; box-shadow: 0 1px 6px rgba(0,0,0,0.3); }

        .profile-btn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--primary);
            color: #000; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; cursor: pointer; object-fit: cover;
        }

        /* 2. IKON NAVIGASI ATAS (AUTO-PLAY BUBBLES) */
        .story-bar {
            display: flex; gap: 15px; padding: 15px 24px; overflow-x: auto; border-bottom: 1px solid #3c4043;
        }
        .story-bubble {
            min-width: 60px; height: 60px; border-radius: 50%; background: #8000ff; /* Warna Ungu */
            border: 2px solid var(--primary); padding: 2px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            transition: transform 0.2s;
        }
        .story-bubble:hover { transform: scale(1.1); }

        /* 3. MAIN CONTENT & VIDEO GRID */
        .container { padding: 24px; }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-google {
            background: var(--surface); color: var(--primary); border: 1px solid #5f6368;
            padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: 500;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-google:hover { background: rgba(138, 180, 248, 0.08); }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
        }
        .video-card {
            background: var(--surface); border-radius: 12px; overflow: hidden;
            transition: box-shadow 0.3s; cursor: pointer;
        }
        .video-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .vid-thumb { width: 100%; height: 170px; background: #000; display: flex; align-items: center; justify-content: center; color: #555; }
        .vid-info { padding: 16px; }
        .vid-title { font-size: 16px; margin: 0 0 8px 0; font-weight: 500; }
        
        /* INTERAKSI (LIKE, SHARE, SUBSCRIBE) */
        .interaction-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .btn-sub { background: var(--text); color: var(--bg); border: none; padding: 6px 16px; border-radius: 18px; font-weight: bold; cursor: pointer; }
        .icon-btn { background: none; border: none; color: var(--text-sec); cursor: pointer; font-size: 14px; }
        .icon-btn:hover { color: var(--text); }

        /* PLAYER MODAL (FULLSCREEN) */
        #player-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; display: none;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; color: white; border: none; font-size: 30px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
        <h1 style="color: var(--primary);">DEAD HAND <span style="color:var(--text); font-weight:300;">OS</span></h1>
        <input type="text" id="username" class="search-input" placeholder="Masukkan Nama Pilot..." style="max-width: 300px; text-align: center;">
        <button class="btn-google" onclick="login()"><span style="font-size:20px;">🦆</span> INISIALISASI SISTEM</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="top-bar">
            <div class="brand">DEAD HAND</div>
            <div class="search-box">
                <input type="text" class="search-input" id="search-bar" placeholder="Telusuri video (Pencarian Pintar)..." onkeyup="cariVideo()">
            </div>
            <img id="my-profile-pic" class="profile-btn" src="" alt="P" onclick="gantiFoto()">
        </div>

        <div class="story-bar" id="story-board">
            </div>

        <div class="container">
            <div class="action-buttons">
                <button class="btn-google" onclick="uploadData('short')">⚡ Upload Shorts (Max 60s)</button>
                <button class="btn-google" onclick="uploadData('long')">📼 Upload Archive (Max 100h)</button>
            </div>

            <div id="peringatan-kiamat" style="color: var(--danger); font-size: 14px; margin-bottom: 20px;" class="hidden">
                ⚠️ PERINGATAN KIAMAT: Subscriber Anda kurang dari 2. Akun akan dihapus dalam 365 hari sejak mendaftar!
            </div>

            <div class="video-grid" id="video-feed">
                </div>
        </div>
    </div>

    <div id="player-modal">
        <button class="close-btn" onclick="tutupPlayer()">&times;</button>
        <video id="vid-player" controls style="max-width: 90%; max-height: 80vh; border-radius: 8px;"></video>
        <h2 id="vid-title" style="margin-top: 20px;">Memutar Data...</h2>
    </div>

    <script>
        // CORE DATABASE (Mengingat Selamanya)
        let dbUsers = JSON.parse(localStorage.getItem('ghand_users')) || [];
        let dbVids = JSON.parse(localStorage.getItem('ghand_vids')) || [];
        let me = null;

        function login() {
            let u = document.getElementById('username').value.trim();
            if(!u) return;

            // Logika 5: Moderasi Kiamat (Cek 1 Tahun & 2 Sub)
            me = dbUsers.find(x => x.name === u);
            if(!me) {
                me = { name: u, joinDate: Date.now(), subs: 0, avatar: '' };
                dbUsers.push(me);
            } else {
                let usiaAkunHari = (Date.now() - me.joinDate) / (1000 * 60 * 60 * 24);
                if (usiaAkunHari > 365 && me.subs < 2) {
                    alert("💀 DEAD HAND PROTOCOL AKTIF: Usia akun lebih dari 1 tahun dan subscriber di bawah 2. SELURUH DATA DIHAPUS!");
                    dbUsers = dbUsers.filter(x => x.name !== u);
                    dbVids = dbVids.filter(x => x.owner !== u);
                    simpanDB(); return location.reload();
                }
            }
            simpanDB();
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            // Set Avatar
            let pic = document.getElementById('my-profile-pic');
            if(me.avatar) { pic.src = me.avatar; pic.style.background = 'transparent'; }
            else { pic.outerHTML = `<div class="profile-btn" onclick="gantiFoto()">${me.name.charAt(0).toUpperCase()}</div>`; }

            if(me.subs < 2) document.getElementById('peringatan-kiamat').classList.remove('hidden');

            renderFeed();
        }

        // Logika 3: Custom Foto Profil Kecil
        function gantiFoto() {
            let url = prompt("Masukkan Link Foto Profil Baru (Harus file kecil/URL):");
            if(url) { me.avatar = url; simpanDB(); location.reload(); }
        }

        // Logika 1: Dua Kategori Upload (60s vs 100h)
        function uploadData(tipe) {
            let limit = tipe === 'short' ? "Maksimal 60 Detik" : "Maksimal 100 Jam";
            let judul = prompt(`Judul Video (${limit}):`);
            if(!judul) return;

            let input = document.createElement('input');
            input.type = 'file'; input.accept = 'video/*';
            input.onchange = e => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function() {
                    dbVids.push({
                        id: Date.now(), owner: me.name, title: judul, 
                        type: tipe, data: reader.result, likes: 0
                    });
                    simpanDB(); renderFeed();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // RENDER UI & Logika 4 (Pencarian Fleksibel)
        function renderFeed(query = "") {
            let story = document.getElementById('story-board');
            let feed = document.getElementById('video-feed');
            story.innerHTML = ""; feed.innerHTML = "";

            // Pencarian Pintar (Mencari kata yang mirip)
            let hasil = dbVids.filter(v => v.title.toLowerCase().includes(query.toLowerCase()));

            hasil.forEach(v => {
                // Logika 2: Ikon Ungu (Story) Auto-Play
                story.innerHTML += `<div class="story-bubble" onclick="putar('${v.data}', '${v.title}')">${v.owner.charAt(0).toUpperCase()}</div>`;

                // Logika 3 & 4: Subscribe Bebek, Like, Share Web
                feed.innerHTML += `
                    <div class="video-card">
                        <div class="vid-thumb" onclick="putar('${v.data}', '${v.title}')">
                            ▶ ${v.type === 'short' ? 'SHORTS (60s)' : 'ARCHIVE (100h)'}
                        </div>
                        <div class="vid-info">
                            <h3 class="vid-title">${v.title}</h3>
                            <div style="font-size:12px; color:var(--text-sec);">${v.owner}</div>
                            
                            <div class="interaction-bar">
                                <button class="btn-sub" onclick="subscribe('${v.owner}')">Subscribe 🦆</button>
                                <div>
                                    <button class="icon-btn" onclick="likeVid(${v.id})">👍 ${v.likes}</button>
                                    <button class="icon-btn" onclick="shareVid(${v.id})">🔗 Share</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function cariVideo() { renderFeed(document.getElementById('search-bar').value); }

        function putar(src, judul) {
            document.getElementById('player-modal').style.display = 'flex';
            let p = document.getElementById('vid-player');
            p.src = src; p.play();
            document.getElementById('vid-title').innerText = judul;
        }
        function tutupPlayer() {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('vid-player').pause();
        }

        // Logika 3 & 4: Sistem Subs & Viral
        function subscribe(targetName) {
            if(targetName === me.name) return alert("Tidak bisa subscribe diri sendiri!");
            let targetUser = dbUsers.find(x => x.name === targetName);
            if(targetUser) { 
                targetUser.subs += 1; 
                simpanDB(); 
                alert(`Anda mensubscribe ${targetName}! Muncul Bebek 🦆`); 
            }
        }
        function likeVid(id) {
            let v = dbVids.find(x => x.id === id);
            if(v) { v.likes++; simpanDB(); renderFeed(); }
        }
        function shareVid(id) {
            // Membuat link pintar yang otomatis menyambung ke website
            let link = window.location.href.split('?')[0] + "?play=" + id;
            prompt("Salin link ini untuk share (Akan otomatis membuka video di web ini):", link);
        }

        function simpanDB() {
            localStorage.setItem('ghand_users', JSON.stringify(dbUsers));
            localStorage.setItem('ghand_vids', JSON.stringify(dbVids));
        }

        // AUTO-PLAY JIKA ADA LINK SHARE DIBUKA
        window.onload = () => {
            let params = new URLSearchParams(window.location.search);
            if(params.has('play')) {
                let v = dbVids.find(x => x.id == params.get('play'));
                if(v) setTimeout(() => putar(v.data, v.title), 1000);
            }
        }
    </script>
</body>
</html>
