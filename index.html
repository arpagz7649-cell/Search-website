<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD HAND - PUBLIC RADAR OS</title>
    <style>
        :root { --google-blue: #8ab4f8; --bg: #000000; --surface: #1a1a1b; --ungu: #8000ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER GOOGLE STYLE */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; background: var(--surface); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .search-bar { flex-grow: 1; margin: 0 20px; padding: 12px 20px; border-radius: 24px; border: 1px solid #444; background: #000; color: white; outline: none; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--google-blue); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; box-shadow: 0 0 10px var(--google-blue); }

        /* IKON NAVIGASI UNGU (STORY) */
        .story-bar { display: flex; gap: 15px; padding: 20px; overflow-x: auto; background: #050505; border-bottom: 1px solid #222; scrollbar-width: none; }
        .icon-ungu { min-width: 60px; height: 60px; border-radius: 50%; background: var(--ungu); border: 2px solid var(--google-blue); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(128, 0, 255, 0.4); }
        .icon-ungu:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--ungu); }

        /* CONTENT GRID */
        .container { padding: 20px; }
        .upload-btns { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-action { background: var(--surface); color: var(--google-blue); border: 1px solid #444; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-action:hover { background: #333; border-color: var(--google-blue); }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--google-blue); transform: translateY(-5px); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; position: relative; font-size: 12px; color: #444; }
        .card-meta { padding: 15px; }
        .tag { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.8); padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; color: #fff; }

        /* MONITOR PLAYER */
        #monitor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        video { width: 90%; max-width: 950px; border-radius: 12px; border: 2px solid #333; box-shadow: 0 0 30px var(--google-blue); }
        .close-btn { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 45px; cursor: pointer; background: none; border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="screen-login" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--google-blue); letter-spacing:12px; margin-bottom:10px;">DEAD HAND</h1>
        <p style="color:#555; font-size:10px; letter-spacing:4px; margin-bottom:40px;">GLOBAL PUBLIC RADAR</p>
        <div style="width:300px; display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="user-in" class="search-bar" style="margin:0; text-align:center;" placeholder="IDENTITAS PILOT">
            <button class="btn-action" style="background:var(--google-blue); color:#000; border:none;" onclick="bootRadar()">AKSES GLOBAL</button>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <div class="header">
            <div style="font-weight:bold; letter-spacing:2px; color:var(--google-blue);">DEAD HAND</div>
            <input type="text" id="search-box" class="search-bar" placeholder="Cari memori publik..." onkeyup="cari()">
            <div id="avatar" class="avatar">?</div>
        </div>

        <div id="story-list" class="story-bar"></div>

        <div class="container">
            <div class="upload-btns">
                <button class="btn-action" onclick="tambahData('short')">⚡ SHORTS (60S)</button>
                <button class="btn-action" onclick="tambahData('long')">📼 ARCHIVE (100H)</button>
            </div>

            <div class="video-grid" id="main-feed"></div>
        </div>
    </div>

    <div id="monitor">
        <button class="close-btn" onclick="tutupVideo()">&times;</button>
        <video id="v-player" controls autoplay></video>
        <h2 id="v-title" style="margin-top:20px; letter-spacing:2px;"></h2>
    </div>

    <script>
        // DATABASE GLOBAL (Disimpan di URL agar adikmu bisa lihat)
        let dataPilot = "";
        let memoriPublik = JSON.parse(localStorage.getItem('dh_public_vids')) || [];

        function bootRadar() {
            dataPilot = document.getElementById('user-in').value;
            if(!dataPilot) return alert("Identitas Pilot Wajib!");
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
            document.getElementById('avatar').innerText = dataPilot.charAt(0).toUpperCase();
            muatRadar();
        }

        // FUNGSI UPLOAD LINK PUBLIK (Google Drive/Lainnya)
        function tambahData(tipe) {
            let judul = prompt(`Judul Video ${tipe.toUpperCase()}:`);
            let link = prompt("PASTE LINK VIDEO PUBLIK (Contoh: Link Google Drive/Dropbox):");
            if(judul && link) {
                memoriPublik.push({
                    id: Date.now(),
                    owner: dataPilot,
                    title: judul,
                    url: link,
                    type: tipe,
                    warna: '#8000ff'
                });
                localStorage.setItem('dh_public_vids', JSON.stringify(memoriPublik));
                muatRadar();
            }
        }

        function muatRadar(filter = "") {
            const story = document.getElementById('story-list');
            const feed = document.getElementById('main-feed');
            story.innerHTML = ""; feed.innerHTML = "";

            const hasil = memoriPublik.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));

            hasil.forEach(v => {
                // Ikon Ungu (Logika 2: Auto-Play)
                story.innerHTML += `<div class="icon-ungu" onclick="putar('${v.url}', '${v.title}')">${v.owner.charAt(0)}</div>`;
                
                // Card Video (Logika 1: 60s vs 100h)
                feed.innerHTML += `
                    <div class="card" onclick="putar('${v.url}', '${v.title}')">
                        <div class="card-thumb">
                            <span class="tag">${v.type.toUpperCase()}</span>
                            [ PUBLIC DATA ]
                        </div>
                        <div class="card-meta">
                            <b>${v.title}</b><br>
                            <small style="color:#555">Pilot: ${v.owner}</small>
                        </div>
                    </div>`;
            });
        }

        function putar(src, title) {
            document.getElementById('monitor').style.display = 'flex';
            const p = document.getElementById('v-player');
            p.src = src; 
            document.getElementById('v-title').innerText = title.toUpperCase();
            p.play();
        }

        function tutupVideo() {
            document.getElementById('monitor').style.display = 'none';
            document.getElementById('v-player').pause();
        }

        function cari() {
            muatRadar(document.getElementById('search-box').value);
        }
    </script>
</body>
</html>
