<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD HAND - RADAR SYSTEM</title>
    
    <style>
        /* RESET DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* Font gaya hacker/terminal */
        }

        /* BACKGROUND UTAMA - HITAM PEKAT */
        body {
            background-color: #030303;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* EFEK GLITCH & SCANLINE (Gaya Layar Monitor Tua) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* CONTAINER UTAMA */
        #terminal-container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* TYPOGRAPHY JUDUL */
        h1 {
            color: #ff0000; /* Merah Darah */
            font-size: 42px;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
        }

        h2.subtitle {
            color: #888888;
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* KOTAK INPUT (FORM) */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            color: #ff3333;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            background-color: transparent;
            border: 1px solid #333;
            border-bottom: 2px solid #ff0000;
            color: #ffffff;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-bottom: 2px solid #ffffff;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        input::placeholder {
            color: #444;
            font-style: italic;
        }

        /* TEKS OPSIONAL */
        .optional-text {
            font-size: 11px;
            color: #666;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        /* TOMBOL (BUTTONS) - SEPERTI DI FOTO */
        button.btn-red {
            background-color: #ff0000;
            color: #ffffff;
            border: none;
            padding: 15px 20px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transition: background 0.2s;
        }

        button.btn-red:hover {
            background-color: #cc0000;
        }

        button.btn-outline {
            background-color: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 15px 20px;
            width: 100%;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button.btn-outline:hover {
            background-color: rgba(255, 0, 0, 0.1);
            color: #ffffff;
        }

        /* TEKS PERINGATAN BAWAH */
        .footer-warning {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
            letter-spacing: 2px;
        }

        /* KELAS UNTUK MENYEMBUNYIKAN LAYAR */
        .hidden {
            display: none !important;
        }

        /* ========================================= */
        /* AREA RADAR VIDEO (MEMORI MASA LALU)       */
        /* ========================================= */
        #radar-video-section {
            width: 100%;
            max-width: 600px;
            text-align: left;
        }

        .video-card {
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(10, 10, 10, 0.8);
            border-left: 4px solid #ff0000;
        }

        .video-card h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="terminal-container">

        <div id="layar-register">
            <h1>DEAD HAND</h1>
            <h2 class="subtitle">Radar Identity Initialization</h2>

            <div class="form-group">
                <label>Username [Sistem Identifikasi]</label>
                <input type="text" id="reg-user" placeholder="Ketik Username..." autocomplete="off">

                <label>Nama Asli [Identitas Personal]</label>
                <input type="text" id="reg-asli" placeholder="Ketik Nama Asli..." autocomplete="off">

                <label>Password [Kunci Wajib]</label>
                <input type="password" id="reg-pass" placeholder="Bentuk Sandi...">

                <label>Alamat Email / Sandi Email</label>
                <p class="optional-text">*Status: Opsional (Set terserah jika mau)</p>
                <input type="email" id="reg-email" placeholder="Ketik Email..." autocomplete="off">
            </div>

            <button class="btn-red" onclick="jalankanRegister()">BUAT IDENTITAS</button>
            <button class="btn-outline" onclick="gantiLayar('layar-login')">SUDAH PUNYA AKSES</button>
            
            <p class="footer-warning">Siapkan mentalmu...</p>
        </div>


        <div id="layar-login" class="hidden">
            <h1>DEAD HAND</h1>
            <h2 class="subtitle">System Access Required</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Identitas Login...">

                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Kunci Akses...">
            </div>

            <button class="btn-red" onclick="jalankanLogin()">AKSES SISTEM</button>
            <button class="btn-outline" onclick="gantiLayar('layar-register')">KEMBALI KE INISIALISASI</button>
            
            <p class="footer-warning">Akses ilegal akan dilacak.</p>
        </div>

    </div>


    <div id="layar-radar" class="hidden">
        <div id="radar-video-section">
            <h1 style="font-size: 28px;">RADAR AKTIF</h1>
            <h2 class="subtitle" id="sapaan-pilot">Welcome, Pilot</h2>
            
            <button class="btn-red" style="width: auto; padding: 10px 20px; margin-bottom: 20px;" onclick="uploadVideoBaru()">+ TAMBAH DATA</button>
            <button class="btn-outline" style="width: auto; padding: 10px 20px; border-color: #555; color: #aaa;" onclick="gantiLayar('layar-login')">TERMINATE</button>

            <div id="wadah-memori-video">
                </div>
        </div>
    </div>

    <script>
        // Ini hanya fungsi dasar agar tombol "Sudah Punya Akses" bisa diklik
        function gantiLayar(targetId) {
            document.getElementById('layar-register').classList.add('hidden');
            document.getElementById('layar-login').classList.add('hidden');
            document.getElementById('layar-radar').classList.add('hidden');
            
            document.getElementById(targetId).classList.remove('hidden');
        }
    </script>

</body>
</html>
