    <script>
        // 1. MEMBANGUN BRANKAS (LOCAL STORAGE)
        // Ini yang bikin data tidak hilang walau di-refresh 1000 kali!
        let databasePilot = JSON.parse(localStorage.getItem('deadhand_users')) || [];
        let brankasVideo = JSON.parse(localStorage.getItem('deadhand_videos')) || [];
        let sesiAktif = null;

        // FUNGSI GANTI LAYAR
        function gantiLayar(targetId) {
            document.getElementById('layar-register').classList.add('hidden');
            document.getElementById('layar-login').classList.add('hidden');
            document.getElementById('layar-radar').classList.add('hidden');
            document.getElementById(targetId).classList.remove('hidden');
        }

        // 2. MANTRA BUAT IDENTITAS (REGISTER)
        function jalankanRegister() {
            let user = document.getElementById('reg-user').value;
            let asli = document.getElementById('reg-asli').value;
            let pass = document.getElementById('reg-pass').value;
            let email = document.getElementById('reg-email').value; // Opsional

            if(!user || !asli || !pass) {
                alert("[SISTEM MENOLAK] Identitas Wajib (Username, Nama, Password) harus diisi!");
                return;
            }

            // Cek kalau username sudah dipakai
            let cekUser = databasePilot.find(p => p.username === user);
            if(cekUser) {
                alert("[ERROR] Username sudah terdaftar di database radar!");
                return;
            }

            // Masukkan ke Brankas
            databasePilot.push({
                username: user,
                namaAsli: asli,
                password: pass,
                email: email
            });

            // Kunci Brankas Permanen
            localStorage.setItem('deadhand_users', JSON.stringify(databasePilot));
            
            alert("IDENTITAS TEREKAM DI BRANKAS PERMANEN!");
            gantiLayar('layar-login'); // Lempar ke halaman login
        }

        // 3. MANTRA LOGIN (PINTU MASUK)
        function jalankanLogin() {
            let user = document.getElementById('login-user').value;
            let pass = document.getElementById('login-pass').value;

            // Cari di brankas, ada nggak yang cocok username & passwordnya?
            let akun = databasePilot.find(p => p.username === user && p.password === pass);

            if(akun) {
                sesiAktif = akun; // Ingat siapa yang lagi login
                document.getElementById('sapaan-pilot').innerText = "Pilot Aktif: " + akun.namaAsli;
                gantiLayar('layar-radar');
                
                // MUNCULKAN VIDEO MASA LALU
                tampilkanVideoLama(); 
            } else {
                alert("[FATAL] Akses Ditolak! Identitas atau Kunci salah.");
            }
        }

        // ==========================================
        // SISTEM MEMORI VIDEO PERMANEN
        // ==========================================
        
        function uploadVideoBaru() {
            let judulVideo = prompt("Masukkan Nama/Judul Data Video:");
            let linkVideo = prompt("Masukkan Link Video (Contoh: link YouTube atau file mp4):");

            if(linkVideo && judulVideo) {
                // Simpan ke brankas video
                brankasVideo.push({
                    pemilik: sesiAktif.username, // Tandai ini video milik siapa
                    judul: judulVideo,
                    link: linkVideo,
                    waktu: new Date().toLocaleString()
                });

                // Kunci Brankas Permanen
                localStorage.setItem('deadhand_videos', JSON.stringify(brankasVideo));
                
                // Langsung munculkan di layar
                tampilkanVideoLama(); 
            }
        }

        function tampilkanVideoLama() {
            let wadah = document.getElementById('wadah-memori-video');
            wadah.innerHTML = ""; // Bersihkan layar dulu

            // Filter: Hanya tampilkan video milik akun yang sedang login ini
            let videoKu = brankasVideo.filter(v => v.pemilik === sesiAktif.username);

            if(videoKu.length === 0) {
                wadah.innerHTML = "<p style='color:#555; font-style:italic;'>[Memori Kosong. Belum ada data video yang tersimpan.]</p>";
                return;
            }

            // Panggil memori dari masa lalu satu per satu
            videoKu.forEach(vid => {
                wadah.innerHTML += `
                    <div class="video-card" style="border: 1px solid #333; border-left: 4px solid #ff0000; padding: 15px; margin-bottom: 15px; background: rgba(10,10,10,0.8);">
                        <h3 style="color:#fff; font-size: 16px; margin-bottom: 5px;">${vid.judul}</h3>
                        <p style="color:#888; font-size: 11px; margin-bottom: 15px;">Diunggah: ${vid.waktu}</p>
                        <a href="${vid.link}" target="_blank" style="color:#ff0000; text-decoration:none; border:1px solid #ff0000; padding:8px 12px; font-size:12px; text-transform:uppercase;">Putar Video</a>
                    </div>
                `;
            });
        }
    </script>
