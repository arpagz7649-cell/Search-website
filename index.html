<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD HAND - MINIMALIST RADAR</title>
    <style>
        /* TEMA GELAP TOTAL - MINIMALIS SAKTI */
        body {
            background-color: #000000; /* Hitam pekat agar tidak putih doang */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* EFEK TEKS MERAH MENYALA SEPERTI FOTO */
        .brand {
            color: #ff0000;
            font-size: 45px;
            font-weight: bold;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .sub-brand {
            color: #888;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* CONTAINER FORM RAPI */
        .container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* DESAIN INPUT MINIMALIS */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 2px;
        }

        input {
            background-color: transparent;
            border: 1px solid #222;
            border-bottom: 2px solid #ff0000;
            color: white;
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border: 1px solid #444;
            border-bottom: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
        }

        /* TOMBOL MERAH SANGAR */
        .btn-main {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-main:hover {
            background-color: #cc0000;
            transform: scale(1.02);
        }

        .btn-outline {
            background-color: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 12px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px;
        }

        /* TEKS BAWAH */
        .footer-note {
            margin-top: 40px;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="brand">DEAD HAND</div>
    <div class="sub-brand">3D CAPSA ROULETTE SYSTEM</div>

    <div class="container" id="box-register">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="reg-user" placeholder="Nama Akun...">
        </div>

        <div class="input-group">
            <label>Nama Asli</label>
            <input type="text" id="reg-asli" placeholder="Nama Lengkap Anda...">
        </div>

        <div class="input-group">
            <label>Password (Wajib Dijawab)</label>
            <input type="password" id="reg-pass" placeholder="Kunci Rahasia...">
        </div>

        <div class="input-group">
            <label>Email (Terserah Mau Isi Atau Tidak)</label>
            <input type="email" id="reg-email" placeholder="Email Opsional...">
        </div>

        <button class="btn-main" onclick="simpanKeBrankas()">BUAT RUANGAN</button>
        <button class="btn-outline" onclick="pindahKeLogin()">GABUNG RUANGAN</button>
        
        <div class="footer-note">Siapkan mentalmu...</div>
    </div>

    <div class="container hidden" id="box-login">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="login-user">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-pass">
        </div>
        <button class="btn-main" onclick="masukSistem()">MASUK KE RADAR</button>
        <button class="btn-outline" onclick="location.reload()">KEMBALI</button>
    </div>

    <script>
        // Mengambil data lama agar tetap ingat walau di-refresh
        let database = JSON.parse(localStorage.getItem('brankas_pilot')) || [];

        function simpanKeBrankas() {
            let user = document.getElementById('reg-user').value;
            let asli = document.getElementById('reg-asli').value;
            let pass = document.getElementById('reg-pass').value;
            let mail = document.getElementById('reg-email').value;

            if(user && asli && pass) {
                database.push({
                    username: user,
                    namaAsli: asli,
                    password: pass,
                    email: mail
                });
                localStorage.setItem('brankas_pilot', JSON.stringify(database));
                alert("Identitas Terkunci di Brankas!");
                pindahKeLogin();
            } else {
                alert("Username, Nama Asli, dan Password HARUS dijawab!");
            }
        }

        function pindahKeLogin() {
            document.getElementById('box-register').classList.add('hidden');
            document.getElementById('box-login').classList.remove('hidden');
        }

        function masukSistem() {
            let u = document.getElementById('login-user').value;
            let p = document.getElementById('login-pass').value;
            let ketemu = database.find(x => x.username === u && x.password === p);

            if(ketemu) {
                alert("Selamat Datang Pilot " + ketemu.namaAsli);
                // Di sini nanti kita panggil fungsi memori video lama kamu
            } else {
                alert("Akses Ditolak!");
            }
        }
    </script>

</body>
</html>
