<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Video (Memori Permanen)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin-top: 30px; }
        .layar { display: none; padding: 20px; }
        .layar-aktif { display: block; }
        input { padding: 10px; width: 80%; max-width: 300px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 12px 20px; background: #0088ff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold;}
        video { width: 100%; max-width: 400px; border-radius: 10px; border: 2px solid #444; margin-top: 20px; }
        .kode-box { background: #333; padding: 10px; color: #00ff00; font-family: monospace; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="layar-1" class="layar layar-aktif">
        <h1>REGISTER SISTEM</h1>
        <input type="text" id="input-nama" placeholder="Ketik Nama Kamu...">
        <br>
        <button onclick="masukSistem()">MASUK KE RADAR</button>
    </div>

    <div id="layar-2" class="layar">
        <h2 id="sapaan-pilot">Halo!</h2>
        <button onclick="bukaMenu('layar-nonton')">Nonton Video Trending</button>
        <button onclick="bukaMenu('layar-upload')" style="background: #ffaa00;">Upload Video Internal</button>
    </div>

    <div id="layar-upload" class="layar">
        <h2>Upload ke Memori Permanen</h2>
        <input type="file" id="file-internal" accept="video/*">
        <br>
        <input type="text" id="judul-video" placeholder="Judul Video...">
        <br>
        <button onclick="prosesUpload()">Simpan Selamanya</button>
        <button onclick="bukaMenu('layar-2')" style="background: #555;">Kembali</button>
        <div id="hasil-upload" class="kode-box" style="display: none;"></div>
    </div>

    <div id="layar-nonton" class="layar">
        <h2 id="judul-nonton">Mencari Data...</h2>
        <video id="player-utama" controls></video>
        <br>
        <button onclick="bukaMenu('layar-2')" style="background: #555;">Menu Utama</button>
    </div>

    <script>
        let databaseVideo = [];

        // 1. ILMU MEMORI PERMANEN: Cek brankas pas website dibuka
        async function cekMemori() {
            let dataLama = await localforage.getItem('db_video');
            if (dataLama) {
                databaseVideo = dataLama; // Tarik data lama biar nggak hilang
                console.log("Memori berhasil dipulihkan! Total video: " + databaseVideo.length);
            }
            
            // Cek apakah Pilot sudah pernah login sebelumnya
            let namaLama = localStorage.getItem('nama_pilot');
            if(namaLama) {
                document.getElementById('input-nama').value = namaLama;
            }
        }
        
        // Panggil fungsi cek memori langsung pas web nyala
        cekMemori();

        // 2. Fungsi Pindah Layar
        function bukaMenu(idLayar) {
            document.querySelectorAll('.layar').forEach(el => el.classList.remove('layar-aktif'));
            document.getElementById(idLayar).classList.add('layar-aktif');
            
            if (idLayar === 'layar-nonton') {
                putarVideoPertama();
            }
        }

        function masukSistem() {
            let nama = document.getElementById('input-nama').value;
            if (nama !== "") {
                localStorage.setItem('nama_pilot', nama); // Simpan nama di dompet
                document.getElementById('sapaan-pilot').innerText = "Pilot " + nama + " Aktif!";
                bukaMenu('layar-2');
            } else {
                alert("Masukkan nama dulu!");
            }
        }

        // 3. Fungsi Upload Video Permanen
        async function prosesUpload() {
            let fileVideo = document.getElementById('file-internal').files[0];
            let judul = document.getElementById('judul-video').value;

            if (fileVideo && judul) {
                let kodeUnik = "v-" + Math.random().toString(16).slice(2, 6);

                // Masukkan file video asli ke dalam array
                databaseVideo.push({
                    judul: judul,
                    kode: kodeUnik,
                    file_asli: fileVideo // Ini yang bikin datanya awet!
                });

                // SIMPAN KE BRANKAS BESI (IndexedDB via localforage)
                await localforage.setItem('db_video', databaseVideo);

                let hasil = document.getElementById('hasil-upload');
                hasil.style.display = "block";
                hasil.innerHTML = `Tersimpan Permanen! <br> Kode: <b>${kodeUnik}</b>`;
                
                // Kosongkan form
                document.getElementById('judul-video').value = "";
                alert("Upload Sukses! Sekarang coba refresh halamannya, video ini tidak akan hilang.");
            } else {
                alert("Pilih video dan isi judulnya!");
            }
        }

        // 4. Fungsi Muter Video dari Brankas
        function putarVideoPertama() {
            let player = document.getElementById('player-utama');
            let teksJudul = document.getElementById('judul-nonton');

            if (databaseVideo.length > 0) {
                let videoPertama = databaseVideo[0]; 
                teksJudul.innerText = "Muter: " + videoPertama.judul;
                
                // Ubah file asli yang diambil dari brankas jadi URL yang bisa diputar
                player.src = URL.createObjectURL(videoPertama.file_asli);
                player.play();
            } else {
                teksJudul.innerText = "Belum ada video!";
                player.src = "";
                alert("Sistem kosong! Kembali dan upload video dulu.");
                bukaMenu('layar-2');
            }
        }
    </script>
</body>
</html>
